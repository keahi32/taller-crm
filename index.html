<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/style.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Taller CRM</div>
        <div class="brand-sub">Panel de gestión</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" onclick="resetData()">
        <i data-lucide="refresh-cw"></i>
        <span>Restablecer datos</span>
      </button>
      <button class="btn btn-ghost" data-theme-toggle aria-label="Cambiar tema">
        <i data-lucide="moon"></i>
        <span>Modo oscuro</span>
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-info">TallerCRM v1.0 &mdash; datos guardados localmente</span>
    </header>
    <main class="page-wrap" id="app">
      <div class="empty-state">
        <i data-lucide="loader" class="empty-icon"></i>
        <p>Cargando...</p>
      </div>
    </main>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="./seed/data.js"></script>
<script src="./src/js/db.js"></script>
<script src="./src/js/dashboard.js"></script>
<script src="./src/js/inventory.js"></script>
<script src="./src/js/costs.js"></script>
<script src="./src/js/sales.js"></script>
<script src="./src/js/app.js"></script>
<script>
(function(){
  const t = document.querySelector('[data-theme-toggle]');
  const r = document.documentElement;
  let d = localStorage.getItem('crm-theme') ||
    (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  r.setAttribute('data-theme', d);
  if (t) t.addEventListener('click', () => {
    d = d === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', d);
    localStorage.setItem('crm-theme', d);
    t.querySelector('i').setAttribute('data-lucide', d === 'dark' ? 'sun' : 'moon');
    lucide.createIcons({ nodes: [t] });
  });
})();
</script>
</body>
</html>
